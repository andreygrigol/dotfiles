#Colorscheme
include ./gruvbox_dark_soft.conf

#Font family/size
# font_family                 FantasqueSansM Nerd Font
# bold_font                   auto
# italic_font                 auto
# bold_italic_font            auto
font_size                   10.5

#Padding
window_padding_width        7

#Ignore this if you don't have a high refresh rate monitor
input_delay                 0
repaint_delay               2 
sync_to_monitor             no

#Disable error sound
enable_audio_bell           no

#Transparent background
# background_opacity          0.95
dynamic_background_opacity  yes
# linux_display_server        x11

hide_window_decorations		yes
cursor_trail				1


# BEGIN_KITTY_FONTS
font_family      family="CaskaydiaCove Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS


# BEGIN_KITTY_THEME
# Gruvbox Dark Soft
include current-theme.conf
# END_KITTY_THEME
